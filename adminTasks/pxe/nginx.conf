worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Additional MIME types for iPXE boot files
    types {
        text/plain ipxe;
    }

    access_log /var/log/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        # iPXE boot script at root
        location = /ipxe-boot.ipxe {
            add_header Content-Type text/plain;
        }

        # Boot assets (kernel, initramfs, cmdline)
        location / {
            autoindex off;
        }
    }
}
