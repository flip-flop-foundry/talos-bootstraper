services:
  pxe-server:
    image: nginx:alpine
    container_name: talos-pxe-server
    restart: unless-stopped
    ports:
      - "${TALOS_PXE_SERVER_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./assets:/usr/share/nginx/html:ro

  dnsmasq:
    image: quay.io/poseidon/dnsmasq:v0.5.0
    container_name: talos-pxe-dnsmasq
    restart: unless-stopped
    entrypoint: ["/usr/sbin/dnsmasq", "-k", "-C", "/etc/dnsmasq.conf"]
    profiles:
      - proxydhcp
    cap_add:
      - NET_ADMIN
    network_mode: host
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro

  tftp:
    image: quay.io/poseidon/dnsmasq:v0.5.0
    container_name: talos-pxe-tftp
    restart: unless-stopped
    entrypoint:
      - /usr/sbin/dnsmasq
      - -k
      - --port=0
      - --enable-tftp
      - --tftp-root=/var/lib/tftpboot
      - --tftp-single-port
      - --log-queries
      - --log-facility=-
    profiles:
      - tftp
    ports:
      - "69:69/udp"
    volumes:
      - ./tftp:/var/lib/tftpboot:ro
