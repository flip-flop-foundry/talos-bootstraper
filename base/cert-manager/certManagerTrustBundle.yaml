#-----------------------------------
# Cert-Manager Trust Bundle
#
# Makes sure that the cluster CA is available in all namespaces
# A config map called "cluster-ca-bundle" will be created in all namespaces
# containing the CA certificate in PEM format under the key "ca.crt"
# Additionally, Java KeyStore (JKS) and PKCS12 formats are also provided
# for applications that require them.
#-----------------------------------

apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: cluster-ca-bundle
spec:
  sources:
    - useDefaultCAs: false
    - secret:
        name: "${CLUSTER_NAME}-ca-secret"
        key: "ca.crt"
  target:
    configMap:
      key: "ca.crt"
    namespaceSelector: {} #Sync to all namespaces
    additionalFormats:
      jks:
        key: "bundle.jks"
      pkcs12:
        key: "bundle.p12"
