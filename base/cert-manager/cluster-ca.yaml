apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${TALOS_CLUSTER_NAME}-ca-cert
  namespace: ${CERT_MGR_NAMESPACE}
spec:
  isCA: true
  commonName: ${TALOS_CLUSTER_ENDPOINT}
  dnsNames:
    - ${TALOS_CLUSTER_ENDPOINT}
  secretName: ${TALOS_CLUSTER_NAME}-ca-secret
  duration: 87600h # 10 years
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ${TALOS_CLUSTER_NAME}-ca-issuer
spec:
  ca:
    secretName: ${TALOS_CLUSTER_NAME}-ca-secret