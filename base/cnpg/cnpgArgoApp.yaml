apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
      initial-deploy-with-kubectl: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"  # Deploy CNPG operator first
spec:
  project: cluster-services
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 10m
  sources:
    - chart: cloudnative-pg
      repoURL: https://cloudnative-pg.github.io/charts
      targetRevision: ${CNPG_HELM_VERSION}
      helm:
        releaseName: cnpg
        valueFiles:
          - $values/rendered/${OVERLAY_NAME}/cnpg/cnpgValues.yaml
    - repoURL: ${GITEA_CLUSTER_SERVICES_REPO_URL}
      targetRevision: ${GITEA_CLUSTER_SERVICES_REPO_BRANCH}
      ref: values
