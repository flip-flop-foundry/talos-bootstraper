---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: globalenc-1replica-retained-backedup-hdd-cp
  annotations:
    field.cattle.io/description: Uses global encryption key. Retains volumes. 1 Replica, backed up daily, hdd, controlplane
allowVolumeExpansion: true
parameters:
  csi.storage.k8s.io/provisioner-secret-name: "longhorn-luks-global-key"
  csi.storage.k8s.io/provisioner-secret-namespace: "longhorn-system"
  csi.storage.k8s.io/node-publish-secret-name: "longhorn-luks-global-key"
  csi.storage.k8s.io/node-publish-secret-namespace: "longhorn-system"
  csi.storage.k8s.io/node-stage-secret-name: "longhorn-luks-global-key"
  csi.storage.k8s.io/node-stage-secret-namespace: "longhorn-system"
  csi.storage.k8s.io/node-expand-secret-name: "longhorn-luks-global-key"
  csi.storage.k8s.io/node-expand-secret-namespace: "longhorn-system"
  encrypted: "true"
  fromBackup: ""
  numberOfReplicas: "1"
  staleReplicaTimeout: "2880"
  dataLocality: "best-effort"
  diskSelector: "hdd"
  recurringJobSelector: '[
    {
    "name":"${LONGHORN_BACKUP_JOB_NAME}",
    "isGroup":false
    },
    {
    "name":"fstrim-all",
    "isGroup":false
    },
    {
    "name":"delete-excessive-snapshots-daily",
    "isGroup":false
    }
    ]'
provisioner: driver.longhorn.io
reclaimPolicy: Retain

