apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: longhorn-ui-tls
  namespace: longhorn-system
  annotations:
    description: "TLS certificate for Longhorn UI"
spec:
  secretName: longhorn-ui-tls-cert
  issuerRef:
    name: ${TALOS_CLUSTER_NAME}-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - longhorn.${CLUSTER_EXTERNAL_DOMAIN}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: longhorn-ui-auth
spec:
  basicAuth:
    secret: longhorn-ui-auth-secret