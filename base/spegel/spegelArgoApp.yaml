apiVersion: v1
kind: Namespace
metadata:
  name: ${SPEGEL_NAMESPACE}
  labels:
    initial-deploy-with-kubectl: "true"
    # Talos's default PSA profile is too restrictive for Spegel (hostPort, host mounts).
    # https://spegel.dev/docs/getting-started/#talos
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spegel
  namespace: ${ARGOCD_NAMESPACE}
  annotations:
    # sync-wave only affects ordering within an ArgoCD app-of-apps sync; it has no effect
    # when Applications are applied directly via kubectl (as in cluster-bootstrap.sh).
    # Actual early-node ordering is enforced by the system-node-critical PriorityClass
    # and the Nidhogg taint, not this annotation.
    argocd.argoproj.io/sync-wave: "-45"
spec:
  project: cluster-services
  destination:
    namespace: ${SPEGEL_NAMESPACE}
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
    retry:
      limit: 10
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 10m
  sources:
    - chart: spegel
      repoURL: https://spegel-org.github.io/spegel #https://artifacthub.io/packages/helm/spegel/spegel
      targetRevision: ${SPEGEL_HELM_VERSION}
      helm:
        releaseName: spegel
        valueFiles:
          - $values/rendered/${OVERLAY_NAME}/spegel/spegelHelmValues.yaml
    - repoURL: ${GITEA_CLUSTER_SERVICES_REPO_URL}
      targetRevision: ${GITEA_CLUSTER_SERVICES_REPO_BRANCH}
      ref: values
