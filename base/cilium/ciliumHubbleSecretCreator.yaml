---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hubble-ui-secret-creator
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hubble-ui-secret-creator
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hubble-ui-secret-creator
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hubble-ui-secret-creator
subjects:
  - kind: ServiceAccount
    name: hubble-ui-secret-creator
    namespace: kube-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hubble-ui-secret-creator
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 3
  template:
    metadata:
      name: hubble-ui-secret-creator
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccountName: hubble-ui-secret-creator
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: secret-creator
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              SECRET_NAME="hubble-ui-auth-secret"
              NAMESPACE="kube-system"

              echo "Checking if secret ${SECRET_NAME} exists in namespace ${NAMESPACE}..."

              if kubectl get secret "${SECRET_NAME}" -n "${NAMESPACE}" >/dev/null 2>&1; then
                echo "Secret ${SECRET_NAME} already exists. Skipping creation."
                exit 0
              fi

              echo "Secret does not exist. Generating secure password..."

              # Generate a 32-character random password using base64
              PASSWORD=$(head -c 24 /dev/urandom | base64 | tr -d '/+=' | head -c 32)

              echo "Creating secret ${SECRET_NAME}..."

              kubectl create secret generic "${SECRET_NAME}" \
                -n "${NAMESPACE}" \
                --type=kubernetes.io/basic-auth \
                --from-literal=username=admin \
                --from-literal=password="${PASSWORD}"

              echo "Secret ${SECRET_NAME} created successfully!"
              echo "Username: admin"
              echo "Password has been set (retrieve from secret if needed)"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
