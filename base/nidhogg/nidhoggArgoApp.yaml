apiVersion: v1
kind: Namespace
metadata:
  name: ${NIDHOGG_NAMESPACE}
  labels:
    initial-deploy-with-kubectl: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nidhogg
  namespace: ${ARGOCD_NAMESPACE}
  annotations:
    # sync-wave only affects ordering within an ArgoCD app-of-apps sync; it has no effect
    # when Applications are applied directly via kubectl (as in cluster-bootstrap.sh).
    # Actual ordering is enforced by the Nidhogg taint mechanism: nodes are held with a
    # NoSchedule taint until Spegel is ready, regardless of when this Application syncs.
    argocd.argoproj.io/sync-wave: "-45"
spec:
  project: cluster-services
  destination:
    namespace: ${NIDHOGG_NAMESPACE}
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
    retry:
      limit: 10
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 10m
  sources:
    - chart: nidhogg
      repoURL: oci://ghcr.io/pelotech/charts #https://github.com/pelotech/nidhogg
      targetRevision: ${NIDHOGG_HELM_VERSION}
      helm:
        releaseName: nidhogg
        valueFiles:
          - $values/rendered/${OVERLAY_NAME}/nidhogg/nidhoggHelmValues.yaml
    - repoURL: ${GITEA_CLUSTER_SERVICES_REPO_URL}
      targetRevision: ${GITEA_CLUSTER_SERVICES_REPO_BRANCH}
      ref: values
