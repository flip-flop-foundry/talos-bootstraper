# https://github.com/postfinance/kubelet-csr-approver
# https://artifacthub.io/packages/helm/kubelet-csr-approver/kubelet-csr-approver

# providerRegex is required: regex matched against the node name in the CSR
# username (system:node:<nodename>). Use .* to approve all nodes, or restrict
# to a specific naming pattern (e.g. '^.*\.yourCluster\.example\.com$').
providerRegex: "${CSR_APPROVER_PROVIDER_REGEX}"

# 2 replicas with leader election (chart default): one active controller, one standby.
# Leader election ensures only one instance approves CSRs at a time; the second
# replica provides instant failover without interruption. Suitable for all cluster sizes.
replicas: 2

resources:
  requests:
    memory: "32Mi"
    cpu: "10m"
  limits:
    memory: "128Mi"
    cpu: "200m"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
  # hostUsers: false (user namespace isolation) is not exposed by the chart's values schema.
  # The chart template does not support setting hostUsers on the pod spec.

# The chart already enforces strong container-level security by default:
#   allowPrivilegeEscalation: false, readOnlyRootFilesystem: true,
#   capabilities.drop: [ALL], seccompProfile.type: RuntimeDefault
# These defaults do not need to be repeated here.
