---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-secrets-bootstrap
  namespace: ${GITEA_NAMESPACE}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-secrets-bootstrap
  namespace: ${GITEA_NAMESPACE}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-secrets-bootstrap
  namespace: ${GITEA_NAMESPACE}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-secrets-bootstrap
subjects:
  - kind: ServiceAccount
    name: gitea-secrets-bootstrap
    namespace: ${GITEA_NAMESPACE}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-secrets-bootstrap
  namespace: ${GITEA_NAMESPACE}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  
  backoffLimit: 3
  template:
    metadata:
      name: gitea-secrets-bootstrap
    spec:
      serviceAccountName: gitea-secrets-bootstrap
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: secrets-bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              
              NAMESPACE="gitea"
              
              # Function to generate a secure random string
              generate_secure_key() {
                head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 43
              }
              
              # Function to generate a 32-character random password
              generate_password() {
                head -c 24 /dev/urandom | base64 | tr -d '/+=' | head -c 32
              }
              
              # Helper function to create a secret if it doesn't exist
              create_secret_if_not_exists() {
                local secret_name="$1"
                local secret_type="$2"
                local labels="${3:-}"  # Optional labels parameter, defaults to empty
                
                # Check if third parameter is actually a secret entry (contains ":") instead of labels (contains "=")
                if [[ "${labels}" == *:* ]] && [[ "${labels}" != *=* ]]; then
                  labels=""  # It's actually an entry, not labels
                  shift 2
                else
                  shift 3
                fi
                local entries=("$@")
                
                echo "Checking if secret ${secret_name} exists in namespace ${NAMESPACE}..."
                
                if kubectl get secret "${secret_name}" -n "${NAMESPACE}" >/dev/null 2>&1; then
                  echo "  ✓ Secret ${secret_name} already exists. Skipping creation."
                  return 0
                fi
                
                echo "  Creating secret ${secret_name}..."
                
                # Build kubectl create secret command
                local cmd="kubectl create secret generic '${secret_name}' -n '${NAMESPACE}' --type='${secret_type}'"
                
                for entry in "${entries[@]}"; do
                  local key="${entry%%:*}"
                  local value="${entry#*:}"
                  cmd="${cmd} --from-literal=${key}=${value}"
                done
                
                eval "$cmd"
                
                # Add labels if provided (format: "key1=value1,key2=value2")
                if [[ -n "${labels}" ]]; then
                  kubectl label secret "${secret_name}" -n "${NAMESPACE}" ${labels} --overwrite
                fi
                
                echo "  ✓ Secret ${secret_name} created successfully!"
              }
              
              # Create admin credentials secret
              create_secret_if_not_exists "gitea-bootstrap-admin-secret" "kubernetes.io/basic-auth" \
                username:admin \
                password:"$(generate_password)"
              
              # Create PSQL user credentials secret
              #create_secret_if_not_exists "gitea-sql-user" "kubernetes.io/basic-auth" "cnpg.io/reload=true" \
              #  username:${GITEA_PSQL_USERNAME} \
              #  password:"$(generate_password)"
              
              # Create PSQL storage encryption key secret
              create_secret_if_not_exists "gitea-sql-1" "Opaque" \
                CRYPTO_KEY_VALUE:"$(generate_secure_key)"

              # Create PSQL storage encryption key secret
              create_secret_if_not_exists "gitea-sql-2" "Opaque" \
                CRYPTO_KEY_VALUE:"$(generate_secure_key)"
              
              # Create shared storage encryption key secret
              create_secret_if_not_exists "gitea-shared-storage" "Opaque" \
                CRYPTO_KEY_VALUE:"$(generate_secure_key)"
              
              echo "All Gitea secrets have been created/verified successfully!"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
