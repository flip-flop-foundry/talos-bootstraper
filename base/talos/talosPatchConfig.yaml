version: v1alpha1
machine:
  kubelet:
    extraMounts:
      - destination: /var/lib/longhorn #https://longhorn.io/docs/1.11.0/advanced-resources/os-distro-specific/talos-linux-support/#data-path-mounts
        source: /var/lib/longhorn
        type: bind
        options:
          - bind
          - rw
          - rshared
    extraConfig:
      serverTLSBootstrap: true
  certSANs: 
    - "$TALOS_CLUSTER_ENDPOINT"
  kernel: 
    modules:
      - name: nvme_tcp
      - name: vfio_pci
  sysctls:
    vm.nr_hugepages: "1024"
    user.max_user_namespaces: "11255" #Enable user namespaces support, https://docs.siderolabs.com/kubernetes-guides/security/usernamespace
  features:
    hostDNS:
      forwardKubeDNSToHost: false
  # Required for Spegel on Talos. Config fragments in /var/etc/cri/conf.d/ are
  # merged by containerd at startup (Talos's writable CRI config directory).
  #
  # 1. Disable layer discarding: Talos enables discard_unpacked_layers by default,
  #    which prevents Spegel from serving cached images to peers.
  # 2. Set registry config_path to /var/etc/cri/conf.d so containerd loads
  #    the mirror configs (hosts.toml files) that Spegel writes into subdirectories there.
  files:
    - path: /var/etc/cri/conf.d/20-spegel.part
      permissions: 0o644
      op: create
      content: |
        [plugins."io.containerd.cri.v1.images"]
          discard_unpacked_layers = false
    - path: /var/etc/cri/conf.d/20-spegel-registry.part
      permissions: 0o644
      op: create
      content: |
        [plugins."io.containerd.cri.v1.images"]
          [plugins."io.containerd.cri.v1.images".registry]
            config_path = "/var/etc/cri/conf.d"
cluster:
  allowSchedulingOnControlPlanes: $TALOS_ALLOW_SCHEDULING_ON_CONTROLPLANES
  network:
    cni:
        name: none
    podSubnets:
      - "$POD_CIDR"
    serviceSubnets:
      - "$SERVICE_CIDR"
  proxy:
    disabled: true