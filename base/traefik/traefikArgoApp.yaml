apiVersion: v1
kind: Namespace
metadata:
  name: traefik
  labels:
    pod-security.kubernetes.io/enforce: privileged
    initial-deploy-with-kubectl: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: traefik
spec:
  project: cluster-services
  destination:
    namespace: traefik
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
    retry:
      limit: 10
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 10m
  sources:
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: ${TRAEFIK_HELM_VERSION}
      helm:
        releaseName: traefik
        valueFiles:
          - $values/talos/rendered/${OVERLAY_NAME}/traefik/traefikHelmValues.yaml
    - repoURL: ${GITEA_CLUSTER_SERVICES_REPO_URL}
      targetRevision: ${GITEA_CLUSTER_SERVICES_REPO_BRANCH}
      ref: values
      path: talos/rendered/${OVERLAY_NAME}/traefik
      directory:
        recurse: false
        exclude: "{traefikHelmValues.yaml,traefikArgoApp.yaml}"

