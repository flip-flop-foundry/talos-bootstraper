ingressClass:  # @schema additionalProperties: false
  enabled: true
  isDefaultClass: false
  name: "traefik"

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.${CLUSTER_EXTERNAL_DOMAIN}`)
    # Expose dashboard via standard HTTP(S) entrypoints
    entryPoints: ["websecure"]
    tls:
      # Use a dedicated TLS secret issued by cert-manager
      secretName: traefik-dashboard-tls
    middlewares:
      - name: dashboard-auth    

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

service:
  enabled: true
  single: true  # One Service for both TCP and UDP
  type: LoadBalancer
  annotations:
    advertise-via-dns: "true"  # Critical for ExternalDNS management
    external-dns.alpha.kubernetes.io/hostname: traefik.${CLUSTER_EXTERNAL_DOMAIN}  # Critical for ExternalDNS management

ports:
  web:
    expose:
      default: true
    exposedPort: 80
    # Global HTTP → HTTPS redirect. Implemented as a lowest-priority catch-all router,
    # so any explicit IngressRoute/Ingress on the 'web' entrypoint will take precedence
    # and bypass this redirect (opt-out by defining an explicit HTTP route).
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true
  websecure:
    expose:
      default: true
    exposedPort: 443
    tls:
      enabled: true

# Enforce TLS 1.2+ and forward-secrecy-only cipher suites cluster-wide.
# The 'default' TLSOption applies to all routes that don't reference their own option.
# TLS 1.3 ciphers are fixed in Go's TLS stack and are always enabled automatically.
tlsOptions:
  default:
    minVersion: VersionTLS12
    cipherSuites:
      # ECDHE (forward secrecy) + AEAD ciphers only.
      # CBC, non-FS, and deprecated ciphers are intentionally excluded.
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
      - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    curvePreferences:
      # X25519 first: faster and more secure than NIST P-curves for most clients.
      # CurveP521 omitted: no practical security gain over P384, significantly slower.
      - X25519
      - CurveP256
      - CurveP384

extraObjects:
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: hsts-headers
      namespace: traefik
    spec:
      headers:
        # Strict-Transport-Security: instructs browsers to always use HTTPS.
        # Does not pin any certificate or CA — purely a "use HTTPS" directive.
        stsSeconds: 31536000       # 1 year
        stsIncludeSubdomains: true
        stsPreload: true
        # Prevent MIME-type sniffing attacks
        contentTypeNosniff: true
        # Prevent clickjacking — allow framing from same origin only
        customFrameOptionsValue: "SAMEORIGIN"
        # Limit referrer information sent cross-origin
        referrerPolicy: "strict-origin-when-cross-origin"
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: traefik-dashboard
      namespace: traefik
    spec:
      secretName: traefik-dashboard-tls
      issuerRef:
        kind: ClusterIssuer
        name: ${TALOS_CLUSTER_NAME}-ca-issuer
      dnsNames:
        - "traefik.${CLUSTER_EXTERNAL_DOMAIN}"
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: dashboard-auth
    spec:
      basicAuth:
        secret: dashboard-auth-secret