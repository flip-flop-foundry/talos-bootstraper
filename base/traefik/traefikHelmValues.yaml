ingressClass:  # @schema additionalProperties: false
  enabled: true
  isDefaultClass: false
  name: "traefik"

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.${CLUSTER_EXTERNAL_DOMAIN}`)
    # Expose dashboard via standard HTTP(S) entrypoints
    entryPoints: ["websecure"]
    tls:
      # Use a dedicated TLS secret issued by cert-manager
      secretName: traefik-dashboard-tls
    middlewares:
      - name: dashboard-auth    

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

service:
  enabled: true
  single: true  # One Service for both TCP and UDP
  type: LoadBalancer
  annotations:
    advertise-via-dns: "true"  # Critical for ExternalDNS management
    external-dns.alpha.kubernetes.io/hostname: traefik.${CLUSTER_EXTERNAL_DOMAIN}  # Critical for ExternalDNS management

ports:
  web:
    expose:
      default: true  # Already true
    exposedPort: 80
  websecure:
    expose:
      default: true  # Already true
    exposedPort: 443
    tls:
      enabled: true

extraObjects:
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: traefik-dashboard
      namespace: traefik
    spec:
      secretName: traefik-dashboard-tls
      issuerRef:
        kind: ClusterIssuer
        name: ${TALOS_CLUSTER_NAME}-ca-issuer
      dnsNames:
        - "traefik.${CLUSTER_EXTERNAL_DOMAIN}"
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: dashboard-auth
    spec:
      basicAuth:
        secret: dashboard-auth-secret