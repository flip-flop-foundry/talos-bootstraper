#https://artifacthub.io/packages/helm/metrics-server/metrics-server

apiService:
  insecureSkipTLSVerify: false

defaultArgs: # https://github.com/kubernetes-sigs/metrics-server/blob/master/docs/command-line-flags.txt
  - --cert-dir=/tmp
  - --kubelet-preferred-address-types=Hostname,InternalDNS,InternalIP
  - --kubelet-use-node-status-port
  - --metric-resolution=15s
  - --tls-min-version=VersionTLS13  # Enforce TLS 1.3
  - --tls-cipher-suites=TLS_AES_128_GCM_SHA256,TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256

replicas: 2

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Resource limits to prevent resource exhaustion
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 1000m
    memory: 500Mi

# Security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault


tls:
  type: cert-manager
  certManager:
    existingIssuer:
      enabled: true
      name: ${TALOS_CLUSTER_NAME}-ca-issuer
      kind: ClusterIssuer