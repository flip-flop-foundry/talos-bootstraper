# This workflow enables triggering the GitHub Copilot Coding Agent by mentioning
# @copilot in issues and pull requests — both bodies and comments.
#
# Covered event paths (all require the triggering user to be a repo admin):
#
#   Issue body (opened/edited):
#     Body contains @copilot → issue assigned to copilot[bot]; non-admins get
#     a reply explaining the restriction.
#
#   Issue comment (created):
#     Comment contains @copilot → issue assigned to copilot[bot]; non-admins
#     get a reply.
#
#   PR body (opened/edited):
#     Body contains @copilot → ai-working label re-applied on linked issues
#     (agent is natively invoked by GitHub); non-admins get a PR comment reply.
#
#   PR conversation comment (created, non-inline):
#     Comment contains @copilot → ai-working label re-applied on linked issues;
#     non-admins get a reply.
#
#   PR inline review comment (created):
#     Comment contains @copilot → ai-working label re-applied on linked issues;
#     non-admins get a reply.
#
# Note: GitHub natively invokes the Copilot agent on @mention in PR threads.
# Our workflow cannot prevent that native invocation, but it enforces the
# admin-only policy by posting a visible warning for non-admin mentions.
# Note: each job independently guards against bot-comment loops via
# `github.event.sender.login != 'copilot[bot]'` in its `if:` condition.
# GitHub Actions job conditions cannot reference shared variables, so this
# guard must be repeated per job — the string 'copilot[bot]' is a static
# GitHub-defined identifier and will not change.
name: "Copilot Mention Trigger"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Issue body (opened / edited) — assign to copilot[bot] if body mentions @copilot
  # ─────────────────────────────────────────────────────────────────────────────
  handle-issue-body-mention:
    name: Assign issue to Copilot on body @mention
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.body, '@copilot') &&
      github.event.sender.login != 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check permissions and assign to copilot
        uses: actions/github-script@v7
        with:
          script: |
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;
            const actor    = context.payload.sender.login;
            const issueNum = context.issue.number;

            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: actor,
              });
              permission = data.permission;
            } catch {
              permission = 'none';
            }

            if (permission !== 'admin') {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNum,
                body: `@${actor} Only repository admins can trigger the GitHub Copilot Coding Agent via @mention. Please ask a repository admin to assign or mention @copilot.`,
              });
              core.notice(`@mention by non-admin @${actor} on issue #${issueNum} (via issue body) — ignored.`);
              return;
            }

            // Skip if copilot[bot] is already assigned (e.g. edited body after first trigger)
            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
            const alreadyAssigned = (issue.assignees || []).some(a => a.login === 'copilot[bot]');
            if (alreadyAssigned) {
              core.notice(`Issue #${issueNum} already assigned to copilot[bot] — skipping.`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: issueNum,
              assignees: ['copilot[bot]'],
            });
            core.notice(`Issue #${issueNum} assigned to copilot[bot] by admin @${actor} (via issue body).`);

  # ─────────────────────────────────────────────────────────────────────────────
  # Issue comment (created) — assign to copilot[bot] when an admin mentions @copilot
  # ─────────────────────────────────────────────────────────────────────────────
  handle-issue-comment-mention:
    name: Assign issue to Copilot on comment @mention
    # issue_comment fires for both issue and PR threads; filter to issues only here
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.sender.login != 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check permissions and assign to copilot
        uses: actions/github-script@v7
        with:
          script: |
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const commenter = context.payload.sender.login;
            const issueNum  = context.issue.number;

            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: commenter,
              });
              permission = data.permission;
            } catch {
              permission = 'none';
            }

            if (permission !== 'admin') {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNum,
                body: `@${commenter} Only repository admins can trigger the GitHub Copilot Coding Agent via @mention. Please ask a repository admin to assign or mention @copilot.`,
              });
              core.notice(`@mention by non-admin @${commenter} on issue #${issueNum} (via issue comment) — ignored.`);
              return;
            }

            // Assign the issue to copilot[bot] — the label management workflow
            // will pick this up and add the "ai-working" label automatically.
            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: issueNum,
              assignees: ['copilot[bot]'],
            });
            core.notice(`Issue #${issueNum} assigned to copilot[bot] by admin @${commenter} (via issue comment).`);

  # ─────────────────────────────────────────────────────────────────────────────
  # PR body (opened / edited) — admin check, then delegate label update to helper
  # ─────────────────────────────────────────────────────────────────────────────
  handle-pr-body-check:
    name: Guard @copilot mention in PR body (admin check)
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.body, '@copilot') &&
      github.event.sender.login != 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    outputs:
      is_admin: ${{ steps.check.outputs.is_admin }}

    steps:
      - name: Check admin permission
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const actor = context.payload.sender.login;
            const prNum = context.payload.pull_request.number;

            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: actor,
              });
              permission = data.permission;
            } catch {
              permission = 'none';
            }

            if (permission !== 'admin') {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNum,
                body: `@${actor} Only repository admins can trigger the GitHub Copilot Coding Agent via @mention. Please ask a repository admin to mention @copilot.`,
              });
              core.notice(`@mention by non-admin @${actor} on PR #${prNum} (via PR body) — ignored.`);
              core.setOutput('is_admin', 'false');
            } else {
              core.notice(`Admin @${actor} mentioned @copilot in PR #${prNum} body — triggering label update.`);
              core.setOutput('is_admin', 'true');
            }

  handle-pr-body-label:
    name: Reapply ai-working label after PR body @mention
    needs: handle-pr-body-check
    if: needs.handle-pr-body-check.outputs.is_admin == 'true'
    uses: ./.github/workflows/copilot-reapply-label.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    permissions:
      issues: write
      pull-requests: read

  # ─────────────────────────────────────────────────────────────────────────────
  # PR conversation comment (non-inline) — admin check, then delegate label update
  # issue_comment fires for PR threads too; filter to PRs here
  # ─────────────────────────────────────────────────────────────────────────────
  handle-pr-conversation-check:
    name: Guard @copilot mention in PR conversation comment (admin check)
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.sender.login != 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    outputs:
      is_admin: ${{ steps.check.outputs.is_admin }}

    steps:
      - name: Check admin permission
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const commenter = context.payload.sender.login;
            const prNumber  = context.issue.number;  // issue.number == PR number here

            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: commenter,
              });
              permission = data.permission;
            } catch {
              permission = 'none';
            }

            if (permission !== 'admin') {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: `@${commenter} Only repository admins can trigger the GitHub Copilot Coding Agent via @mention. Please ask a repository admin to mention @copilot.`,
              });
              core.notice(`@mention by non-admin @${commenter} on PR #${prNumber} (via PR conversation comment) — ignored.`);
              core.setOutput('is_admin', 'false');
            } else {
              core.notice(`Admin @${commenter} mentioned @copilot in PR #${prNumber} conversation — triggering label update.`);
              core.setOutput('is_admin', 'true');
            }

  handle-pr-conversation-label:
    name: Reapply ai-working label after PR conversation @mention
    needs: handle-pr-conversation-check
    if: needs.handle-pr-conversation-check.outputs.is_admin == 'true'
    uses: ./.github/workflows/copilot-reapply-label.yml
    with:
      pr_number: ${{ github.event.issue.number }}
    permissions:
      issues: write
      pull-requests: read

  # ─────────────────────────────────────────────────────────────────────────────
  # PR inline review comment — admin check, then delegate label update
  # ─────────────────────────────────────────────────────────────────────────────
  handle-pr-review-comment-check:
    name: Guard @copilot mention in PR inline review comment (admin check)
    if: >
      github.event_name == 'pull_request_review_comment' &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.sender.login != 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    outputs:
      is_admin: ${{ steps.check.outputs.is_admin }}

    steps:
      - name: Check admin permission
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const commenter = context.payload.sender.login;
            const prNumber  = context.payload.pull_request.number;

            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: commenter,
              });
              permission = data.permission;
            } catch {
              permission = 'none';
            }

            if (permission !== 'admin') {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: `@${commenter} Only repository admins can trigger the GitHub Copilot Coding Agent via @mention. Please ask a repository admin to mention @copilot.`,
              });
              core.notice(`@mention by non-admin @${commenter} on PR #${prNumber} (via inline review comment) — ignored.`);
              core.setOutput('is_admin', 'false');
            } else {
              core.notice(`Admin @${commenter} mentioned @copilot in PR #${prNumber} review comment — triggering label update.`);
              core.setOutput('is_admin', 'true');
            }

  handle-pr-review-comment-label:
    name: Reapply ai-working label after PR review comment @mention
    needs: handle-pr-review-comment-check
    if: needs.handle-pr-review-comment-check.outputs.is_admin == 'true'
    uses: ./.github/workflows/copilot-reapply-label.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    permissions:
      issues: write
      pull-requests: read
