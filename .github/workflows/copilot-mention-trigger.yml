# This workflow enables triggering the GitHub Copilot Coding Agent by mentioning
# @copilot in an issue or pull request comment.
#
# Issue comments:
#   When an admin mentions @copilot, the issue is assigned to copilot[bot].
#   This in turn triggers the "Copilot Label Management" workflow which applies
#   the "ai-working" label. Non-admins receive an explanatory reply.
#
# Pull request review comments:
#   When @copilot is mentioned in a PR comment the agent is natively notified
#   by GitHub. This workflow adds the "ai-working" label back to any linked issue
#   so the state is visible, and posts a confirmation comment on the PR.
name: "Copilot Mention Trigger"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Issue comment — assign to copilot[bot] when an admin mentions @copilot
  # ─────────────────────────────────────────────────────────────────────────────
  handle-issue-mention:
    name: Assign issue to Copilot on @mention
    # Only run for issue comments (not PR comments) that mention @copilot
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@copilot')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check permissions and assign to copilot
        uses: actions/github-script@v7
        with:
          script: |
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const commenter = context.payload.sender.login;
            const issueNum  = context.issue.number;

            // Skip if the comment is from copilot[bot] itself (avoid loops)
            if (commenter === 'copilot[bot]') {
              core.notice('Comment is from copilot[bot] — skipping.');
              return;
            }

            // Check commenter's permission level
            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: commenter,
              });
              permission = data.permission;
            } catch {
              permission = 'none';
            }

            if (permission !== 'admin') {
              // Let the commenter know only admins can trigger Copilot
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNum,
                body: `@${commenter} Only repository admins can trigger the GitHub Copilot Coding Agent via @mention. Please ask a repository admin to assign or mention @copilot.`,
              });
              core.notice(`@mention by non-admin @${commenter} on issue #${issueNum} — ignored.`);
              return;
            }

            // Assign the issue to copilot[bot] — the label management workflow
            // will pick this up and add the "ai-working" label automatically.
            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: issueNum,
              assignees: ['copilot[bot]'],
            });

            core.notice(`Issue #${issueNum} assigned to copilot[bot] by admin @${commenter}.`);

  # ─────────────────────────────────────────────────────────────────────────────
  # PR review comment — re-apply "ai-working" on linked issue and acknowledge
  # ─────────────────────────────────────────────────────────────────────────────
  handle-pr-mention:
    name: Acknowledge @copilot mention in PR comment
    # Only run for PR review comments that mention @copilot and are not from the bot
    if: >
      github.event_name == 'pull_request_review_comment' &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.sender.login != 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Re-apply ai-working label on linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const pr        = context.payload.pull_request;
            const commenter = context.payload.sender.login;

            // Skip if the comment is from copilot[bot] itself (avoid loops)
            if (commenter === 'copilot[bot]') {
              core.notice('Comment is from copilot[bot] — skipping.');
              return;
            }

            // Parse linked issue numbers from the PR body.
            // Supports: "Closes #N", "Fixes: #N", "Resolves #123", etc.
            const prBody = pr.body || '';
            const linkedIssues = [];
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?):?\s+#(\d+)/gi;
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              linkedIssues.push(parseInt(match[1], 10));
            }

            // Ensure the "ai-working" label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'ai-working' });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'ai-working',
                color: 'fbca04',
                description: 'GitHub Copilot is currently working on this issue',
              });
            }

            for (const issueNumber of linkedIssues) {
              // Only re-apply the label if the issue is currently assigned to copilot[bot]
              let assignees = [];
              try {
                const { data } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber,
                });
                assignees = (data.assignees || []).map(a => a.login);
              } catch (err) {
                core.warning(`Could not fetch issue #${issueNumber}: ${err.message}`);
                continue;
              }

              if (!assignees.includes('copilot[bot]')) {
                core.notice(`Issue #${issueNumber} is not assigned to copilot[bot] — skipping label update.`);
                continue;
              }

              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issueNumber,
                  labels: ['ai-working'],
                });
                core.notice(`Re-applied "ai-working" to issue #${issueNumber} (Copilot mentioned in PR #${pr.number}).`);
              } catch (err) {
                core.warning(`Could not add label to issue #${issueNumber}: ${err.message}`);
              }
            }
