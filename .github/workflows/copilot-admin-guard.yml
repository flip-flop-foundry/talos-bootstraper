# This workflow enforces that only repository admins can assign issues to the
# GitHub Copilot Coding Agent. If a non-admin assigns an issue to Copilot the
# assignment is immediately removed and an explanatory comment is posted.
name: "Copilot Assignment Guard"

on:
  issues:
    types: [assigned]

jobs:
  enforce-admin-only:
    # Only run when the issue is assigned to the Copilot coding agent bot
    if: github.event.assignee.login == 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check assigner permissions and enforce admin-only rule
        uses: actions/github-script@v7
        with:
          script: |
            const assigner = context.payload.sender.login;
            const issueNumber = context.issue.number;

            // Retrieve the assigner's permission level for this repository
            let permission;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: assigner,
              });
              permission = data.permission;
            } catch (err) {
              // If the user is not a collaborator the API returns 404 — treat as no access
              permission = 'none';
            }

            if (permission !== 'admin') {
              // Remove the Copilot assignment
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: ['copilot[bot]'],
              });

              // Inform the user
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `@${assigner} Only repository admins can assign issues to the GitHub Copilot Coding Agent. Your assignment has been removed.\n\nIf you would like Copilot to work on this issue, please ask a repository admin to assign it.`,
              });

              core.notice(`Assignment of Copilot to issue #${issueNumber} removed — @${assigner} does not have admin permissions (current level: ${permission}).`);
            } else {
              core.notice(`Assignment of Copilot to issue #${issueNumber} by admin @${assigner} is permitted.`);
            }
