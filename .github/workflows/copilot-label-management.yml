# This workflow manages GitHub issue labels to reflect the current state of
# AI-assisted work. When an issue is assigned to the Copilot Coding Agent the
# "ai-working" label is applied. When Copilot opens a pull request the
# "ai-working" label is removed and "needs-human-review" is applied to the
# linked issue so humans know they need to act.
name: "Copilot Label Management"

on:
  issues:
    types: [assigned]
  pull_request:
    types: [opened]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # When an issue is assigned to copilot[bot], add the "ai-working" label
  # ─────────────────────────────────────────────────────────────────────────────
  add-ai-working-label:
    name: Mark issue as AI working
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'assigned' &&
      github.event.assignee.login == 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Ensure "ai-working" label exists and apply it
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const issue = context.issue.number;

            // Create label if it does not exist yet
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'ai-working' });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'ai-working',
                color: 'fbca04',
                description: 'GitHub Copilot is currently working on this issue',
              });
            }

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: issue,
              labels: ['ai-working'],
            });

            core.notice(`Added "ai-working" label to issue #${issue}.`);

  # ─────────────────────────────────────────────────────────────────────────────
  # When copilot[bot] opens a PR, find the linked issue and swap labels:
  # remove "ai-working", add "needs-human-review"
  # ─────────────────────────────────────────────────────────────────────────────
  mark-ready-for-review:
    name: Mark linked issue as needing human review
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.user.login == 'copilot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Update labels on linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prBody = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;

            // Parse "Closes #N", "Fixes #N", "Resolves #N" from the PR body
            const linkedIssues = [];
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              linkedIssues.push(parseInt(match[1], 10));
            }

            if (linkedIssues.length === 0) {
              core.notice(`PR #${prNumber}: no linked issues found in body — skipping label update.`);
              return;
            }

            // Ensure "needs-human-review" label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'needs-human-review' });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'needs-human-review',
                color: '0075ca',
                description: 'AI has finished work — a human review is required',
              });
            }

            for (const issueNumber of linkedIssues) {
              // Remove "ai-working" label (ignore if not present)
              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issueNumber,
                  name: 'ai-working',
                });
              } catch {
                // Label was not on the issue — no action needed
              }

              // Add "needs-human-review" label
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issueNumber,
                labels: ['needs-human-review'],
              });

              core.notice(`Issue #${issueNumber}: removed "ai-working", added "needs-human-review".`);
            }
