# Reusable workflow — Re-applies the "ai-working" label to any issues linked
# from a PR body that are currently assigned to copilot[bot].
#
# Called by copilot-mention-trigger.yml after admin permission has been verified.
name: "Reapply ai-working label (helper)"

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number whose linked issues should have the label re-applied"
        required: true
        type: number

jobs:
  reapply:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Re-apply ai-working label on linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const prNumber  = ${{ inputs.pr_number }};

            // Fetch PR to get its body for linked-issue parsing
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const prBody = pr.body || '';

            // Supports: "Closes #N", "Fixes: #N", "Resolves #123", etc.
            const linkedIssues = [];
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?):?\s+#(\d+)/gi;
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              linkedIssues.push(parseInt(match[1], 10));
            }

            if (linkedIssues.length === 0) {
              core.notice(`PR #${prNumber}: no linked issues found — skipping label update.`);
              return;
            }

            // Ensure the "ai-working" label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'ai-working' });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'ai-working',
                color: 'fbca04',
                description: 'GitHub Copilot is currently working on this issue',
              });
            }

            for (const issueNumber of linkedIssues) {
              // Only re-apply if the issue is currently assigned to copilot[bot]
              let assignees = [];
              try {
                const { data } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                assignees = (data.assignees || []).map(a => a.login);
              } catch (err) {
                core.warning(`Could not fetch issue #${issueNumber}: ${err.message}`);
                continue;
              }

              if (!assignees.includes('copilot[bot]')) {
                core.notice(`Issue #${issueNumber} not assigned to copilot[bot] — skipping.`);
                continue;
              }

              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issueNumber,
                  labels: ['ai-working'],
                });
                core.notice(`Re-applied "ai-working" to issue #${issueNumber} (PR #${prNumber}).`);
              } catch (err) {
                core.warning(`Could not add label to issue #${issueNumber}: ${err.message}`);
              }
            }
