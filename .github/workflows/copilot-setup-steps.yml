# This workflow defines environment setup steps that run before GitHub Copilot
# Coding Agent starts working on any task in this repository.
# See: https://docs.github.com/en/copilot/using-github-copilot/using-copilot-coding-agent-to-work-on-tasks/about-copilot-coding-agent
#
# Network access: The Copilot sandbox has outbound internet access enabled so
# the agent can fetch upstream Helm chart documentation, community best
# practices, and other reference material during development.
name: "Copilot Setup Steps"

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shell linting tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y shellcheck gettext-base curl

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.3"
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
